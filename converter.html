<style>
  :root{
    /* base canvas */
    --bg-0:#eef1f7;
    --mesh-a:rgba(110,150,255,.30);
    --mesh-b:rgba(190,130,255,.24);
    --mesh-c:rgba(255,150,190,.20);
    --mesh-d:rgba(120,220,255,.18);

    /* ink */
    --ink:#1D1D1F;
    --ink-soft:#5B5C63;
    --ink-faint:#8A8B93;

    /* accent — apple blue → indigo */
    --accent:#0A84FF;
    --accent-2:#5E5CE6;
    --accent-dark:#0064D6;
    --accent-soft:rgba(10,132,255,.14);
    --accent-ring:rgba(10,132,255,.32);

    /* warm accent for TOC chips (was "brass") */
    --brass:#C8862A;
    --brass-soft:rgba(200,134,42,.14);

    --line:rgba(30,30,40,.09);
    --line-strong:rgba(30,30,40,.16);

    --danger:#FF3B30;
    --danger-soft:rgba(255,59,48,.12);
    --success:#28A745;
    --success-soft:rgba(40,178,90,.14);

    --r-lg:28px;
    --r-md:18px;
    --r-sm:13px;

    /* glass surfaces */
    --glass-blur:26px;
    --glass-bg:rgba(255,255,255,.55);
    --glass-bg-strong:rgba(255,255,255,.72);
    --glass-border:rgba(255,255,255,.75);
    --glass-hairline:rgba(255,255,255,.9);
    --glass-shadow:0 24px 70px -28px rgba(30,40,70,.38), 0 2px 8px rgba(30,40,70,.06);
    --glass-inset:inset 0 1px 0 rgba(255,255,255,.85), inset 0 0 0 1px rgba(255,255,255,.18);

    --page:var(--glass-bg);
    --page-shade:rgba(255,255,255,.34);
    --shadow-page:var(--glass-shadow);
    color-scheme:light;
  }
  html.dark{
    --bg-0:#08080D;
    --mesh-a:rgba(70,110,255,.30);
    --mesh-b:rgba(150,90,255,.26);
    --mesh-c:rgba(255,90,150,.16);
    --mesh-d:rgba(60,200,255,.16);

    --ink:#F2F2F7;
    --ink-soft:#B7B8C2;
    --ink-faint:#7C7D88;

    --accent:#409CFF;
    --accent-2:#7D7AFF;
    --accent-dark:#63B4FF;
    --accent-soft:rgba(64,156,255,.18);
    --accent-ring:rgba(64,156,255,.38);

    --brass:#E3A857;
    --brass-soft:rgba(227,168,87,.16);

    --line:rgba(255,255,255,.09);
    --line-strong:rgba(255,255,255,.16);

    --danger:#FF6961;
    --danger-soft:rgba(255,105,97,.16);
    --success:#4CD671;
    --success-soft:rgba(76,214,113,.16);

    --glass-bg:rgba(34,34,44,.46);
    --glass-bg-strong:rgba(40,40,52,.62);
    --glass-border:rgba(255,255,255,.12);
    --glass-hairline:rgba(255,255,255,.22);
    --glass-shadow:0 24px 70px -24px rgba(0,0,0,.7), 0 2px 10px rgba(0,0,0,.4);
    --glass-inset:inset 0 1px 0 rgba(255,255,255,.10), inset 0 0 0 1px rgba(255,255,255,.06);

    --page:var(--glass-bg);
    --page-shade:rgba(255,255,255,.05);
    --shadow-page:var(--glass-shadow);
    color-scheme:dark;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{background:var(--bg-0);}
  body{
    background:
      radial-gradient(1100px 780px at 12% -8%, var(--mesh-a), transparent 58%),
      radial-gradient(1000px 760px at 92% 6%, var(--mesh-b), transparent 55%),
      radial-gradient(900px 820px at 20% 108%, var(--mesh-c), transparent 55%),

  @media (prefers-reduced-motion: reduce){ body{animation:none;} }
  body, .intake, .spread-outer, .toolbar, .page-right, .cover-thumb, .cover-dropzone,
  input[type=text], input[type=url], textarea, select, .chip, .status,
  .btn-ghost, .nav-icon-btn, .icon-round-btn, .theme-toggle, .brand svg{
    transition:background-color .3s ease, color .3s ease, border-color .3s ease, box-shadow .3s ease;
  }
  .wrap{width:100%;max-width:1040px;}

  /* ---------- brand header ---------- */
  .brand{display:flex;align-items:center;gap:12px;margin:6px 4px 22px;}

  .brand h1{
    font-family:'Fraunces',serif;font-weight:650;font-size:26px;letter-spacing:-0.01em;margin:0;color:var(--ink);
  }
  .brand .tag{display:none;}

  .mode-switch{
    display:flex;align-items:center;gap:8px;margin:-8px 4px 22px;font-size:13px;
    color:var(--ink-faint);text-decoration:none;width:fit-content;transition:color .15s ease;
  }
  .mode-switch svg{width:15px;height:15px;flex:none;}
  .mode-switch:hover{color:var(--accent);}

  /* ---------- glass surface base ---------- */
  .welcome-card, .intake, .spread-outer, .modal-box{
    background:var(--glass-bg);
    -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(180%);
    backdrop-filter:blur(var(--glass-blur)) saturate(180%);

  /* ---------- welcome screen ---------- */

    gap:34px;min-height:calc(100vh - 88px);
  }

    padding:64px 40px;text-align:center;max-width:440px;width:100%;
    position:relative;overflow:hidden;
  }
  .welcome-card::before{

    background:linear-gradient(90deg, transparent, var(--glass-hairline), transparent);
  }
  .welcome-card::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(125deg, rgba(255,255,255,.35) 0%, rgba(255,255,255,0) 30%, rgba(255,255,255,0) 70%, rgba(255,255,255,.15) 100%);

    width:60px;height:60px;margin:0 auto 22px;border-radius:50%;

    box-shadow:0 10px 26px -10px rgba(10,132,255,.55), inset 0 1px 1px rgba(255,255,255,.5);
  }

  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}

    font-family:'Fraunces',serif;font-weight:650;font-size:27px;letter-spacing:-0.01em;

  }
  .welcome-sub{font-size:14.5px;color:var(--ink-soft);margin:0 0 30px;line-height:1.55;}

  }
  .footer-link svg{width:16px;height:16px;}

  @media (max-width:760px){
    .welcome-card{padding:44px 24px;border-radius:22px;}
    .welcome-title{font-size:23px;}

  /* ---------- upload state ---------- */
  .intake{
    border-radius:var(--r-lg);
    padding:56px 32px;
    position:relative;
    overflow:hidden;
  }
  .intake::before{
    content:"";position:absolute;top:0;left:0;right:0;height:1px;

  .drop-zone{
    position:relative;

    max-width:420px;
    margin:0 auto;

  html.dark .drop-zone{background:rgba(255,255,255,.03);}

  .file-name{color:var(--accent);font-weight:500;margin-top:14px;font-size:13.5px;font-family:'IBM Plex Mono',monospace;}

  /* ---------- spread (loaded state) ---------- */

    border-radius:var(--r-lg);
    overflow:hidden;
    opacity:0;transform:translateY(6px);
    animation:rise .45s ease forwards;
  }
  @keyframes rise{to{opacity:1;transform:none;}}
  .toolbar{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:16px 22px;border-bottom:1px solid var(--line);
    background:rgba(255,255,255,.10);
  }
  html.dark .toolbar{background:rgba(255,255,255,.03);}
  .toolbar .meta{font-size:13px;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .link-btn{
    background:none;border:none;color:var(--accent);font-size:13.5px;font-weight:500;cursor:pointer;

  .link-btn:hover{color:var(--accent-dark);text-decoration:underline;}

  }
  .spread::before{
    content:"";position:absolute;top:0;bottom:0;left:50%;width:1px;margin-left:0;
    background:linear-gradient(to bottom, transparent, var(--line-strong) 15%, var(--line-strong) 85%, transparent);
    pointer-events:none;
  }
  .page{padding:28px 30px 32px;}
  .page-left{border-right:none;}
  .page-right{background:var(--page-shade);}

  .field-label{
    display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);
    margin:0 0 6px;letter-spacing:.02em;text-transform:uppercase;
  }
  .form-group{margin:0 0 18px;}
  .hint{font-size:12px;color:var(--ink-faint);margin-top:5px;line-height:1.4;}
  input[type=text], input[type=url], textarea{
    width:100%;padding:11px 13px;border:1px solid var(--line-strong);border-radius:var(--r-sm);

    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    transition:border-color .15s, box-shadow .15s, background .15s;
  }
  html.dark input[type=text], html.dark input[type=url], html.dark textarea{background:rgba(255,255,255,.05);}
  input[type=text]:focus, input[type=url]:focus, textarea:focus{

  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  textarea.annot{min-height:90px;resize:vertical;font-size:14.5px;line-height:1.5;}

  h2.section-title{
    font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin:0 0 16px;color:var(--ink);

  }
  h2.section-title svg{width:16px;height:16px;color:var(--brass);}

  /* cover uploader */
  .cover-row{display:flex;gap:16px;align-items:flex-start;margin-bottom:22px;}
  .cover-thumb{
    flex:none;width:96px;height:132px;border-radius:14px;background:rgba(255,255,255,.18);
    border:1px solid var(--glass-border);box-shadow:0 10px 24px -12px rgba(20,26,40,.35), var(--glass-inset);
    display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;
    -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  }
  html.dark .cover-thumb{background:rgba(255,255,255,.04);}
  .cover-thumb img{width:100%;height:100%;object-fit:cover;}
  .cover-thumb svg{width:26px;height:26px;color:var(--ink-faint);}
  .cover-thumb::after{
    content:"";position:absolute;left:0;top:0;bottom:0;width:5px;

  }
  .cover-controls{flex:1;min-width:0;display:flex;gap:10px;align-items:stretch;}
  .cover-dropzone{
    flex:1;min-width:0;border:1.5px dashed var(--line-strong);border-radius:var(--r-md);padding:14px 12px;

  .cover-dropzone input{display:none;}
  .cover-dropzone svg{width:16px;height:16px;flex:none;}
  .cover-remove-btn{
    flex:none;width:52px;border:1.5px dashed var(--line-strong);border-radius:var(--r-md);

  html.dark .cover-remove-btn{background:rgba(255,255,255,.03);}

    display:flex;flex-direction:column;max-height:90vh;width:100%;overflow:hidden;

  .modal-box-sm{max-width:360px;}

  .cover-search-state{
    font-size:13px;color:var(--ink-faint);text-align:center;padding:34px 10px;
  }
  .cover-search-state-inline{padding:16px 10px 4px;}

  .mini-spinner{
    width:13px;height:13px;border-radius:50%;flex:none;
    border:2px solid var(--line-strong);border-top-color:var(--accent);
    display:inline-block;vertical-align:-2px;margin-right:7px;animation:spin .7s linear infinite;
  }
  .mini-spinner-lg{width:22px;height:22px;border-width:3px;margin-right:0;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .cover-results-grid{

  }
  .cover-result{

  .cover-quality-badge.q-mid{background:rgba(200,134,42,.78);}

    position:absolute;bottom:6px;left:6px;right:6px;font-size:9.5px;padding:2px 6px;border-radius:20px;
    background:rgba(255,255,255,.75);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);color:#1D1D1F;font-family:'IBM Plex Sans',sans-serif;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;
  }
  html.dark .cover-source-badge{background:rgba(34,34,44,.75);color:#F2F2F7;}
  .cover-tile-overlay{
    position:absolute;inset:0;background:rgba(15,18,30,.55);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);display:none;
    align-items:center;justify-content:center;text-align:center;padding:8px;
  }
  .cover-result.selecting .cover-tile-overlay{display:flex;}
  .cover-tile-error-text{color:#fff;font-size:11px;line-height:1.4;}

  /* genre */
  select, input#genre{cursor:text;}

  /* table of contents chips */
  .toc-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;max-height:78px;overflow-y:auto;padding-right:2px;}
  .toc-empty{font-size:12.5px;color:var(--ink-faint);}
  .chip{
    font-family:'IBM Plex Mono',monospace;font-size:11.5px;padding:4px 9px;border-radius:20px;
    background:var(--brass-soft);color:var(--brass);border:1px solid transparent;cursor:pointer;
    max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .chip:hover{border-color:var(--brass);}
  .chip.lvl2{opacity:.8;}
  .chip.lvl3{opacity:.62;}
  .chip.lvl0{font-style:italic;background:rgba(255,255,255,.15);color:var(--ink-faint);}
  html.dark .chip.lvl0{background:rgba(255,255,255,.05);}
  .chip.active{background:linear-gradient(135deg, var(--accent), var(--accent-2));color:#fff;opacity:1;border-color:transparent;box-shadow:0 4px 12px -4px rgba(10,132,255,.5);}

  .chapter-editor{flex:1;min-width:0;display:flex;flex-direction:column;}
  .chapter-editor-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px;}
  .chapter-position{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-faint);}
  .chapter-nav-btns{display:flex;gap:6px;}
  .nav-icon-btn{
    width:28px;height:28px;border-radius:50%;border:1px solid var(--line-strong);background:rgba(255,255,255,.20);
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);
  }
  html.dark .nav-icon-btn{background:rgba(255,255,255,.05);}
  .nav-icon-btn:hover{border-color:var(--accent);color:var(--accent);}
  .nav-icon-btn:disabled{opacity:.35;pointer-events:none;}

  .preface-note{font-size:12.5px;color:var(--ink-faint);font-style:italic;}
  .preface-note:empty{margin:0;}

  .chapter-title-bar{display:flex;gap:8px;margin-bottom:10px;}
  .chapter-title-bar input{
    flex:1;font-family:'Fraunces',serif;font-size:17px;font-weight:560;padding:9px 12px;
    border:1px solid var(--line-strong);border-radius:var(--r-sm);background:rgba(255,255,255,.35);color:var(--ink);
  }
  html.dark .chapter-title-bar input{background:rgba(255,255,255,.05);}
  .chapter-title-bar input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-ring);}
  .level-select{
    width:76px;padding:9px 8px;border:1px solid var(--line-strong);border-radius:var(--r-sm);font-size:13px;
    background:rgba(255,255,255,.35);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;
  }
  html.dark .level-select{background:rgba(255,255,255,.05);}
  .icon-btn-danger{
    width:38px;height:38px;flex:none;border-radius:var(--r-sm);border:1px solid var(--line-strong);
    background:rgba(255,255,255,.20);color:var(--ink-faint);cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  html.dark .icon-btn-danger{background:rgba(255,255,255,.05);}
  .icon-btn-danger:hover{border-color:var(--danger);color:var(--danger);}

  textarea#chapterBodyText{
    flex:1;width:100%;min-height:340px;resize:vertical;
    font-family:'Source Serif 4',serif;font-size:16px;line-height:1.65;
    padding:16px 18px;border:1px solid var(--line-strong);border-radius:var(--r-sm);
    background:rgba(255,255,255,.30);color:var(--ink);
  }
  html.dark textarea#chapterBodyText{background:rgba(255,255,255,.04);}

  /* actions */
  .actions{padding:18px 30px 26px;border-top:1px solid var(--line);display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .btn{
    padding:12px 22px;border-radius:999px;font-size:14.5px;font-weight:600;cursor:pointer;
    border:1px solid transparent;font-family:'IBM Plex Sans',sans-serif;transition:background .15s,border-color .15s,transform .1s,box-shadow .15s;
    display:inline-flex;align-items:center;gap:8px;
  }
  .btn:active{transform:translateY(1px) scale(.99);}
  .btn svg{width:16px;height:16px;}
  .btn-primary{
    background:linear-gradient(135deg, var(--accent), var(--accent-2));color:#fff;
    box-shadow:0 10px 24px -10px rgba(10,132,255,.55), inset 0 1px 0 rgba(255,255,255,.35);
  }
  .btn-primary:hover{box-shadow:0 14px 30px -10px rgba(10,132,255,.65), inset 0 1px 0 rgba(255,255,255,.35);filter:brightness(1.04);}
  .btn-primary:disabled{opacity:.5;pointer-events:none;}
  .btn-ghost{background:rgba(255,255,255,.20);color:var(--ink-soft);border-color:var(--line-strong);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);}
  html.dark .btn-ghost{background:rgba(255,255,255,.05);}
  .btn-ghost:hover{border-color:var(--ink-faint);color:var(--ink);}
  .status{
    font-size:13.5px;padding:9px 14px;border-radius:999px;display:none;align-items:center;gap:8px;
    background:var(--success-soft);color:var(--success);
  }
  .status svg{width:15px;height:15px;flex:none;}
  .status.error{background:var(--danger-soft);color:var(--danger);}

  @media (max-width:760px){
    body{padding:18px 12px 40px;}
    .brand{margin:4px 2px 16px;gap:10px;}
    .brand h1{font-size:21px;}
    .brand .tag{display:none;}
    .brand svg{width:22px;height:22px;}
    .theme-toggle{width:34px;height:34px;}
    .intake{padding:34px 16px;border-radius:20px;}
    .drop-zone{padding:38px 14px;}
    .spread{grid-template-columns:1fr;}
    .spread::before{display:none;}
    .page-right{border-top:1px solid var(--line);}
    .row2{grid-template-columns:1fr;gap:14px;}
    .page{padding:20px 16px 24px;}
    .toolbar{padding:12px 14px;}
    .toolbar .meta{font-size:12px;}
    textarea#chapterBodyText{min-height:260px;}

    /* prevent iOS auto-zoom on focus (needs >=16px) */
    input[type=text], input[type=url], textarea, select{font-size:16px;}

    .cover-row{gap:12px;}
    .cover-thumb{width:80px;height:110px;}
    .cover-dropzone{padding:12px 10px;font-size:12.5px;}

    .modal-overlay{padding:0;align-items:flex-end;}
    .modal-box{max-width:none;width:100%;max-height:88vh;border-radius:24px 24px 0 0;}
    .cover-source-options{flex-direction:column;}
    .cover-results-grid{grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:10px;}

    .chapter-title-bar{flex-wrap:wrap;}
    .chapter-title-bar input{flex:1 1 100%;}
    .level-select{flex:1;width:auto;}
    .icon-btn-danger{width:44px;height:44px;}

    .chapter-nav-btns .nav-icon-btn, .icon-round-btn{width:36px;height:36px;}

    /* stretch the bottom action buttons edge-to-edge, keeping the .actions side padding as breathing room */
    .actions{padding:16px 16px 20px;gap:10px;}
    .actions .btn{flex:1 1 0;min-width:0;justify-content:center;white-space:nowrap;}
    .actions .status{flex:1 1 100%;justify-content:center;order:3;}
  }

  @media (max-width:420px){
    .actions{flex-wrap:wrap;}
    .actions .btn-ghost{flex-basis:100%;order:2;}
    .actions .btn-primary{flex-basis:100%;order:1;}
  }

  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  /* ---------- theme toggle ---------- */
  .theme-toggle{
    margin-left:auto;flex:none;width:38px;height:38px;border-radius:50%;
    border:1px solid var(--glass-border);background:var(--glass-bg-strong);color:var(--ink-soft);
    -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
    cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 14px -4px rgba(20,26,40,.25), var(--glass-inset);
  }
  .theme-toggle:hover{border-color:var(--accent);color:var(--accent);}
  .theme-toggle svg{
    position:absolute;width:18px;height:18px;color:inherit;
    transition:opacity .4s ease, transform .5s cubic-bezier(.34,1.56,.64,1), color .25s ease;
  }
  .theme-toggle .icon-sun{opacity:1;transform:scale(1) rotate(0deg);}
  .theme-toggle .icon-moon{opacity:0;transform:scale(.4) rotate(-90deg);}
  html.dark .theme-toggle .icon-sun{opacity:0;transform:scale(.4) rotate(90deg);}
  html.dark .theme-toggle .icon-moon{opacity:1;transform:scale(1) rotate(0deg);}

  /* ---------- circular reveal for theme switch (View Transitions API) ---------- */
  ::view-transition-old(root),
  ::view-transition-new(root){
    animation:none;mix-blend-mode:normal;
  }
  ::view-transition-new(root){
    animation:theme-circle-reveal 550ms ease-in-out;
    clip-path:circle(var(--circle-end-radius,150vmax) at var(--circle-x,50%) var(--circle-y,50%));
  }
  @keyframes theme-circle-reveal{
    from{ clip-path:circle(0px at var(--circle-x,50%) var(--circle-y,50%)); }
    to{ clip-path:circle(var(--circle-end-radius,150vmax) at var(--circle-x,50%) var(--circle-y,50%)); }
  }

  /* ---------- small round icon buttons (close / remove cover) ---------- */
  .icon-round-btn{
    width:34px;height:34px;flex:none;border-radius:50%;border:1px solid var(--line-strong);
    background:rgba(255,255,255,.20);color:var(--ink-soft);cursor:pointer;
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    display:inline-flex;align-items:center;justify-content:center;
  }
  html.dark .icon-round-btn{background:rgba(255,255,255,.05);}
  .icon-round-btn:hover{border-color:var(--accent);color:var(--accent);}
  .icon-round-btn.danger:hover{border-color:var(--danger);color:var(--danger);background:var(--danger-soft);}
  .icon-round-btn svg{width:15px;height:15px;}
</style>
</head>
<body>

<div class="wrap">
  <a class="btn btn-ghost" href="index.html" style="margin:6px 4px 4px;text-decoration:none;">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M11 18l-6-6 6-6"/></svg>
    Назад
  </a>

  <div class="brand" style="margin-top:2px;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 7.1c-1.9-1.6-4.6-2.1-7.7-2.1-.44 0-.8.36-.8.8v12.1c0 .47.4.83.86.8 3 -.02 5.5.53 7.24 2.1 1.74-1.57 4.24-2.12 7.24-2.1.46.03.86-.33.86-.8V5.8c0-.44-.36-.8-.8-.8-3.1 0-5.8.5-7.7 2.1Z"/><path d="M12 7.1v13.6"/></svg>
    <h1 id="pageH1">Конвертер FB2 → EPUB</h1>
    <button class="theme-toggle" id="themeToggle" type="button" title="Переключить тему" aria-label="Переключить тему">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v2.5M12 19v2.5M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2.5 12H5M19 12h2.5M4.2 19.8 6 18M18 6l1.8-1.8"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z"/></svg>
    </button>
  </div>

  <a class="mode-switch" id="modeSwitchLink" href="#">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 3v4a2 2 0 0 1-2 2H4"/><path d="m7 6-3 3 3 3"/><path d="M7 21v-4a2 2 0 0 1 2-2h11"/><path d="m17 18 3-3-3-3"/></svg>

  <div class="intake" id="intake">
    <div class="drop-zone" id="dropZone" tabindex="0" role="button" aria-label="Загрузить файл fb2 для конвертации в epub">
      <svg id="dzIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 7h13l-3-3"/><path d="M20 17H7l3 3"/></svg>
      <div class="dz-title" id="dzTitle">Перетащите .fb2 файл сюда</div>
      <div class="dz-sub" id="dzSub">или нажмите, чтобы выбрать .fb2 / .fb2.zip с устройства — EPUB скачается автоматически</div>
      <input type="file" id="fileInput" accept=".fb2,.zip">
      <div class="file-name" id="fileName"></div>

    <div id="status" class="status" style="margin:22px auto 0;max-width:420px;justify-content:center;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>
      <span id="statusText"></span>
    </div>
  </div>

  <footer class="site-footer app-footer">

        <span>Telegram</span>

      <a href="#" class="footer-link" aria-label="Почта">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m4 6.5 8 6 8-6"/></svg>

<script>
(function(){

  // ---------------- elements ----------------
  const intake = document.getElementById('intake');
  const dropZone = document.getElementById('dropZone');
  const dzIcon = document.getElementById('dzIcon');
  const dzTitle = document.getElementById('dzTitle');
  const dzSub = document.getElementById('dzSub');
  const fileInput = document.getElementById('fileInput');
  const fileName = document.getElementById('fileName');
  const status = document.getElementById('status');
  const statusText = document.getElementById('statusText');
  const themeToggle = document.getElementById('themeToggle');
  const pageH1 = document.getElementById('pageH1');
  const modeSwitchLink = document.getElementById('modeSwitchLink');
  const modeSwitchText = document.getElementById('modeSwitchText');

  // ---------------- conversion direction ----------------
  const mode = new URLSearchParams(location.search).get('mode') === 'epub2fb2' ? 'epub2fb2' : 'fb2epub';

  function applyModeUI(){
    if (mode === 'epub2fb2'){
      document.title = 'Конвертер EPUB → FB2';
      pageH1.textContent = 'Конвертер EPUB → FB2';
      dzIcon.style.transform = 'scaleX(-1)';
      dzTitle.textContent = 'Перетащите .epub файл сюда';
      dzSub.textContent = 'или нажмите, чтобы выбрать .epub с устройства — FB2 скачается автоматически';
      dropZone.setAttribute('aria-label', 'Загрузить файл epub для конвертации в fb2');
      fileInput.setAttribute('accept', '.epub');
      modeSwitchText.textContent = 'Нужен обратный конвертер — FB2 в EPUB?';
      modeSwitchLink.href = 'converter.html';
    } else {
      modeSwitchText.textContent = 'Нужен обратный конвертер — EPUB в FB2?';
      modeSwitchLink.href = 'converter.html?mode=epub2fb2';
    }
  }
  applyModeUI();

  // ---------------- theme toggle (shared with the editor via localStorage) ----------------
  function applyTheme(toDark){
    document.documentElement.classList.toggle('dark', toDark);
    try { localStorage.setItem('fb2-editor-theme', toDark ? 'dark' : 'light'); } catch(e){}
  }
  themeToggle.addEventListener('click', (e) => {
    const toDark = !document.documentElement.classList.contains('dark');
    if (!document.startViewTransition || window.matchMedia('(prefers-reduced-motion: reduce)').matches){
      applyTheme(toDark);
      return;
    }
    const x = e.clientX || (themeToggle.getBoundingClientRect().left + themeToggle.offsetWidth/2);
    const y = e.clientY || (themeToggle.getBoundingClientRect().top + themeToggle.offsetHeight/2);
    const endRadius = Math.hypot(Math.max(x, innerWidth - x), Math.max(y, innerHeight - y));

    const root = document.documentElement;
    root.style.setProperty('--circle-x', x + 'px');
    root.style.setProperty('--circle-y', y + 'px');
    root.style.setProperty('--circle-end-radius', endRadius + 'px');

    document.startViewTransition(() => applyTheme(toDark));
  });

  // ---------------- status helpers ----------------
  function showStatus(msg, isError){
    statusText.textContent = msg;
    status.className = 'status' + (isError ? ' error' : '');
    status.style.display = 'flex';
  }
  function hideStatus(){ status.style.display = 'none'; }

  // ---------------- fb2 parsing helpers (mirrors the main editor) ----------------
  function extFromMime(mime){
    if (mime.indexOf('png') !== -1) return 'png';
    if (mime.indexOf('webp') !== -1) return 'webp';
    return 'jpg';
  }
  function generateUUID(){
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random()*16|0, v = c==='x' ? r : (r&0x3|0x8);
      return v.toString(16);
    });
  }
  function getMainBody(doc){
    const bodies = Array.from(doc.getElementsByTagName('body'));
    return bodies.find(b => !b.getAttribute('name')) || bodies[0] || null;
  }
  function findBinaryById(doc, id){
    const binaries = Array.from(doc.getElementsByTagName('binary'));
    return binaries.find(b => b.getAttribute('id') === id) || null;
  }
  function processSectionToLines(sectionEl, depth, lines){
    const titleEl = sectionEl.querySelector(':scope > title');
    if (titleEl){
      const t = titleEl.textContent.replace(/\s+/g,' ').trim();
      if (t) lines.push('#'.repeat(Math.min(depth,6)) + ' ' + t);
    }
    for (const child of Array.from(sectionEl.children)){
      const tag = child.tagName.toLowerCase();
      if (tag === 'title') continue;
      if (tag === 'section'){ processSectionToLines(child, depth+1, lines); }
      else if (tag === 'empty-line'){ /* skip, purely visual */ }
      else {
        const t = child.textContent.replace(/\s+/g,' ').trim();
        if (t) lines.push(t);
      }
    }
  }
  function bodyToText(doc){
    const body = getMainBody(doc);
    if (!body) return '';
    const lines = [];
    for (const child of Array.from(body.children)){
      const tag = child.tagName.toLowerCase();
      if (tag === 'section') processSectionToLines(child, 1, lines);
      else if (tag === 'title'){
        const t = child.textContent.replace(/\s+/g,' ').trim();
        if (t) lines.push('# ' + t);
      } else {
        const t = child.textContent.replace(/\s+/g,' ').trim();
        if (t) lines.push(t);
      }
    }
    return lines.join('\n');
  }
  function linesToChapters(text){
    const lines = text.split('\n');
    const result = [];
    let current = null;
    for (const raw of lines){
      const m = raw.match(/^(#{1,6})\s+(.+)$/);
      if (m){
        current = { level: m[1].length, title: m[2].trim(), paragraphs: [] };
        result.push(current);
      } else if (raw.trim() === ''){
        continue;
      } else {
        if (!current){ current = { level:0, title:null, paragraphs: [] }; result.push(current); }
        current.paragraphs.push(raw.trim());
      }
    }
    if (!result.length) result.push({ level:0, title:null, paragraphs: [] });
    return result;
  }

  async function readFB2ZipContent(zip){
    let contentPath = null;
    if (zip.file('content.xml')) {
      contentPath = 'content.xml';
    } else {
      const candidates = Object.keys(zip.files)
        .filter(path => !zip.files[path].dir && /\.fb2$/i.test(path));
      if (candidates.length) {
        candidates.sort((a, b) => a.split('/').length - b.split('/').length);
        contentPath = candidates[0];
      }
    }
    if (!contentPath) throw new Error('В архиве не найден файл .fb2 или content.xml');

    const xmlString = await zip.file(contentPath).async('text');
    const doc = new DOMParser().parseFromString(xmlString, 'text/xml');
    if (doc.querySelector('parsererror')) throw new Error('Файл ' + contentPath + ' повреждён или не является корректным fb2/xml');
    return { doc };
  }

  function extractMeta(doc){
    const titleEl = doc.querySelector('title-info > book-title');
    const title = titleEl ? titleEl.textContent.trim() : '';

    const firstName = doc.querySelector('title-info > author > first-name');
    const lastName = doc.querySelector('title-info > author > last-name');
    const authorFull = [firstName ? firstName.textContent.trim() : '', lastName ? lastName.textContent.trim() : '']
      .filter(Boolean).join(' ');

    const genreEl = doc.querySelector('title-info > genre');
    const genre = genreEl ? genreEl.textContent.trim() : '';

    const annotEl = doc.querySelector('title-info > annotation > p');
    const annotation = annotEl ? annotEl.textContent.trim() : '';

    let cover = null;
    const coverEl = doc.querySelector('title-info > coverpage > image');
    if (coverEl){
      const href = coverEl.getAttribute('href') || coverEl.getAttribute('xlink:href') || coverEl.getAttribute('l:href');
      if (href && href.startsWith('#')){
        const id = href.substring(1);
        const bin = findBinaryById(doc, id);
        if (bin){
          cover = { base64: bin.textContent.trim(), mime: bin.getAttribute('content-type') || 'image/jpeg', id };
        }
      }
    }

    const chapters = linesToChapters(bodyToText(doc));
    const lang = doc.documentElement.getAttribute('xml:lang') || doc.documentElement.getAttribute('lang') || 'ru';

    return { title, authorFull, genre, annotation, cover, chapters, lang };
  }

  // ---------------- epub parsing helpers (mirrors the main editor) ----------------
  function metaText(opfDoc, localName){
    let el = opfDoc.getElementsByTagName('dc:' + localName)[0];
    if (!el){
      const all = opfDoc.getElementsByTagNameNS('http://purl.org/dc/elements/1.1/', localName);
      el = all[0];
    }
    return el ? el.textContent.replace(/\s+/g,' ').trim() : '';
  }
  function splitAuthorName(full){
    full = (full || '').trim();
    if (!full) return { first:'', last:'' };
    const parts = full.split(/\s+/);
    if (parts.length === 1) return { first:'', last: parts[0] };
    const last = parts.pop();
    return { first: parts.join(' '), last };
  }
  function findCoverManifestItem(opfDoc, manifestItems){
    let item = manifestItems.find(it => (it.properties||'').split(/\s+/).includes('cover-image'));
    if (item) return item;
    const metas = Array.from(opfDoc.getElementsByTagName('meta'));
    const coverMeta = metas.find(m => m.getAttribute('name') === 'cover');
    if (coverMeta){
      const id = coverMeta.getAttribute('content');
      item = manifestItems.find(it => it.id === id);
      if (item) return item;
    }
    item = manifestItems.find(it => /image/.test(it.mediaType) && /cover/i.test((it.id||'') + (it.href||'')));
    return item || null;
  }
  function joinEpubPath(dir, href){
    if (!href) return href;
    href = href.split('#')[0];
    if (/^https?:\/\//i.test(href)) return href;
    const combined = dir + href;
    const stack = [];
    for (const part of combined.split('/')){
      if (part === '..') stack.pop();
      else if (part === '.' || part === '') continue;
      else stack.push(part);
    }
    return stack.join('/');
  }
  // manifest/spine hrefs are URIs and are often percent-encoded (spaces, cyrillic filenames, etc.)
  // while the zip entry itself is stored under the raw filename — try several variants.
  function findZipFile(zip, rawPath){
    if (!rawPath) return null;
    const tryPaths = new Set([rawPath]);
    try { tryPaths.add(decodeURIComponent(rawPath)); } catch(e){}
    try { tryPaths.add(encodeURI(rawPath)); } catch(e){}
    for (const p of Array.from(tryPaths)){
      if (p.startsWith('/')) tryPaths.add(p.slice(1));
    }
    for (const p of tryPaths){
      const f = zip.file(p);
      if (f) return { file: f, path: p };
    }
    const norm = (s) => { try { return decodeURIComponent(s); } catch(e){ return s; } };
    const target = norm(rawPath).toLowerCase().replace(/^\//,'');
    const foundKey = Object.keys(zip.files).find(k => norm(k).toLowerCase().replace(/^\//,'') === target);
    return foundKey ? { file: zip.file(foundKey), path: foundKey } : null;
  }
  function normalizeHrefKey(href){
    if (!href) return '';
    let h = href.split('#')[0];
    try { h = decodeURIComponent(h); } catch(e){}
    return h.replace(/^\.?\//,'').toLowerCase();
  }
  // EPUB chapter files are XHTML — parse as real XML first (handles self-closing tags like
  // <title/> correctly); fall back to a sanitized HTML-mode parse for malformed markup.
  function parseXHTML(html){
    const xmlDoc = new DOMParser().parseFromString(html, 'application/xhtml+xml');
    if (xmlDoc && !xmlDoc.querySelector('parsererror') && (xmlDoc.body || xmlDoc.querySelector('body'))){
      return xmlDoc;
    }
    const sanitized = html.replace(/<(title|script|style|textarea)((?:\s+[^>]*)?)\/>/gi, '<$1$2></$1>');
    return new DOMParser().parseFromString(sanitized, 'text/html');
  }
  const EPUB_BLOCK_TAGS = new Set([
    'div','section','article','header','footer','aside','main','figure','figcaption',
    'p','li','blockquote','td','th','dd','dt','pre','details','summary'
  ]);
  async function xhtmlToLines(zip, path){
    const lookup = findZipFile(zip, path);
    if (!lookup) return { lines: [], hasHeading: false };
    const html = await lookup.file.async('text');
    const doc = parseXHTML(html);
    const body = doc.body || doc.querySelector('body');
    const lines = [];
    if (!body) return { lines, hasHeading: false };
    let buf = '';
    const flush = () => {
      const t = buf.replace(/\s+/g,' ').trim();
      if (t) lines.push(t);
      buf = '';
    };
    (function walk(node){
      for (const child of Array.from(node.childNodes)){
        if (child.nodeType === Node.TEXT_NODE){
          buf += child.textContent;
          continue;
        }
        if (child.nodeType !== Node.ELEMENT_NODE) continue;
        const tag = child.tagName.toLowerCase();
        if (tag === 'script' || tag === 'style') continue;
        if (tag === 'br'){ flush(); continue; }
        if (/^h[1-6]$/.test(tag)){
          flush();
          const t = child.textContent.replace(/\s+/g,' ').trim();
          if (t) lines.push('#'.repeat(parseInt(tag[1],10)) + ' ' + t);
          continue;
        }
        if (EPUB_BLOCK_TAGS.has(tag)){
          flush();
          walk(child);
          flush();
          continue;
        }
        walk(child);
      }
    })(body);
    flush();
    return { lines, hasHeading: lines.some(l => /^#{1,6}\s/.test(l)) };
  }
  // many EPUBs mark chapter boundaries only by splitting into separate spine files, without any
  // semantic heading tag inside — pull chapter titles from the epub3 nav document or epub2 NCX.
  async function extractNavTitles(zip, opfDir, manifestItems){
    const map = new Map();
    const addEntry = (href, titleText) => {
      const key = normalizeHrefKey(href);
      const title = (titleText || '').replace(/\s+/g,' ').trim();
      if (key && title && !map.has(key)) map.set(key, title);
    };
    const navItem = manifestItems.find(it => (it.properties||'').split(/\s+/).includes('nav'));
    if (navItem){
      const lookup = findZipFile(zip, joinEpubPath(opfDir, navItem.href));
      if (lookup){
        const html = await lookup.file.async('text');
        const doc = parseXHTML(html);
        Array.from(doc.querySelectorAll('a[href]')).forEach(a => addEntry(a.getAttribute('href'), a.textContent));
      }
    }
    const ncxItem = manifestItems.find(it => /ncx/i.test(it.mediaType) || /\.ncx$/i.test(it.href||''));
    if (ncxItem){
      const lookup = findZipFile(zip, joinEpubPath(opfDir, ncxItem.href));
      if (lookup){
        const xml = await lookup.file.async('text');
        const doc = new DOMParser().parseFromString(xml, 'text/xml');
        Array.from(doc.getElementsByTagName('navPoint')).forEach(np => {
          const contentEl = np.getElementsByTagName('content')[0];
          const textEl = np.getElementsByTagName('text')[0];
          if (contentEl) addEntry(contentEl.getAttribute('src'), textEl ? textEl.textContent : '');
        });
      }
    }
    return map;
  }
  async function readEPUBFromZip(zip){
    const containerLookup = findZipFile(zip, 'META-INF/container.xml');
    if (!containerLookup) throw new Error('Не найден META-INF/container.xml — это не похоже на epub');
    const containerXml = await containerLookup.file.async('text');
    const containerDoc = new DOMParser().parseFromString(containerXml, 'text/xml');
    const rootfileEl = containerDoc.querySelector('rootfile');
    const opfPathRaw = rootfileEl && rootfileEl.getAttribute('full-path');
    const opfLookup = findZipFile(zip, opfPathRaw);
    if (!opfLookup) throw new Error('Не найден OPF-файл в epub');
    const opfPath = opfLookup.path;
    const opfDir = opfPath.includes('/') ? opfPath.slice(0, opfPath.lastIndexOf('/')+1) : '';
    const opfXml = await opfLookup.file.async('text');
    const opfDoc = new DOMParser().parseFromString(opfXml, 'text/xml');
    if (opfDoc.querySelector('parsererror')) throw new Error('OPF-файл повреждён или не является корректным XML');

    const title = metaText(opfDoc, 'title');
    const creator = metaText(opfDoc, 'creator');
    const description = metaText(opfDoc, 'description');
    const subject = metaText(opfDoc, 'subject');
    const language = metaText(opfDoc, 'language') || 'ru';

    const manifestItems = Array.from(opfDoc.getElementsByTagName('item')).map(it => ({
      id: it.getAttribute('id'),
      href: it.getAttribute('href'),
      mediaType: it.getAttribute('media-type') || '',
      properties: it.getAttribute('properties') || ''
    }));
    const spineItemrefs = Array.from(opfDoc.getElementsByTagName('itemref')).map(ir => ir.getAttribute('idref'));
    const coverItem = findCoverManifestItem(opfDoc, manifestItems);
    let spineItems = spineItemrefs.map(idref => manifestItems.find(it => it.id === idref)).filter(Boolean);
    spineItems = spineItems.filter(it => !/\bnav\b/.test(it.properties) && (!coverItem || it.id !== coverItem.id));

    let cover = null;
    if (coverItem){
      const lookup = findZipFile(zip, joinEpubPath(opfDir, coverItem.href));
      if (lookup){
        const base64 = await lookup.file.async('base64');
        const mime = coverItem.mediaType || 'image/jpeg';
        cover = { base64, mime, id: 'cover.' + extFromMime(mime) };
      }
    }

    const navTitles = await extractNavTitles(zip, opfDir, manifestItems);

    let allLines = [];
    let chapterCount = 0;
    for (const item of spineItems){
      const path = joinEpubPath(opfDir, item.href);
      const { lines, hasHeading } = await xhtmlToLines(zip, path);
      if (!lines.length) continue;
      chapterCount++;
      let bodyLines = lines;
      if (!hasHeading){
        const navTitle = navTitles.get(normalizeHrefKey(item.href));
        const heading = navTitle || ('Глава ' + chapterCount);
        if (bodyLines.length && bodyLines[0].toLowerCase() === heading.toLowerCase()){
          bodyLines = bodyLines.slice(1);
        }
        allLines.push('# ' + heading);
      }
      allLines = allLines.concat(bodyLines);
    }

    return { title, creator, description, subject, language, cover, text: allLines.join('\n') };
  }

  // ---------------- build & download epub ----------------
  async function buildAndDownloadEpub(originalFileName, meta){
    const escapeXml = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    const title = meta.title || 'Без названия';
    const authorFull = meta.authorFull || 'Неизвестный автор';
    const genreText = meta.genre || '';
    const annotationText = meta.annotation || '';
    const bookId = 'urn:uuid:' + generateUUID();
    const lang = meta.lang || 'ru';
    const chapters = meta.chapters;
    const cover = meta.cover;

    const zip = new JSZip();
    zip.file('mimetype', 'application/epub+zip', { compression:'STORE' });
    zip.file('META-INF/container.xml',
      '<?xml version="1.0" encoding="UTF-8"?>\n' +
      '<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">\n' +
      '  <rootfiles>\n' +
      '    <rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/>\n' +
      '  </rootfiles>\n' +
      '</container>\n');
    zip.file('OEBPS/style.css', 'body{font-family:serif;line-height:1.6;margin:1.2em;} h1{font-size:1.4em;}');

    const manifestExtra = [];
    const spineIds = [];
    const navItems = [];

    chapters.forEach((ch, idx) => {
      const id = 'chap' + (idx + 1);
      const fname = id + '.xhtml';
      const heading = ch.level > 0 ? ((ch.title && ch.title.trim()) || 'Без названия') : null;
      const hTag = 'h' + Math.min(Math.max(ch.level, 1), 6);
      const paragraphs = ch.paragraphs.filter(p => p.trim() !== '');
      let body = '';
      if (heading) body += `<${hTag}>${escapeXml(heading)}</${hTag}>\n`;
      body += paragraphs.map(p => `<p>${escapeXml(p)}</p>`).join('\n');
      if (!body.trim()) body = '<p></p>';
      const xhtml = `<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE html>\n<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="${lang}">\n<head><meta charset="utf-8"/><title>${escapeXml(heading || title)}</title><link rel="stylesheet" type="text/css" href="style.css"/></head>\n<body>\n${body}\n</body>\n</html>`;
      zip.file('OEBPS/' + fname, xhtml);
      manifestExtra.push({ id, href: fname, mediaType:'application/xhtml+xml' });
      spineIds.push(id);
      navItems.push({ href: fname, label: heading || (idx === 0 ? 'Начало' : ('Глава ' + (idx + 1))) });
    });

    let coverManifest = '', coverSpineRef = '';
    if (cover){
      const coverFile = 'cover.' + extFromMime(cover.mime);
      zip.file('OEBPS/' + coverFile, cover.base64, { base64:true });
      coverManifest = `    <item id="cover-image" href="${coverFile}" media-type="${cover.mime}" properties="cover-image"/>\n    <item id="cover-page" href="cover.xhtml" media-type="application/xhtml+xml"/>\n`;
      zip.file('OEBPS/cover.xhtml',
        `<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE html>\n<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="${lang}">\n<head><meta charset="utf-8"/><title>Обложка</title><style>body{margin:0;text-align:center;}img{max-width:100%;height:auto;}</style></head>\n<body><img src="${coverFile}" alt="Обложка"/></body>\n</html>`);
      coverSpineRef = `    <itemref idref="cover-page" linear="no"/>\n`;
    }

    const manifestXml = manifestExtra.map(m => `    <item id="${m.id}" href="${m.href}" media-type="${m.mediaType}"/>`).join('\n');
    const spineXml = spineIds.map(id => `    <itemref idref="${id}"/>`).join('\n');
    const navPointsXml = navItems.map((n,i) => `    <navPoint id="np${i+1}" playOrder="${i+1}"><navLabel><text>${escapeXml(n.label)}</text></navLabel><content src="${n.href}"/></navPoint>`).join('\n');
    const navLisXml = navItems.map(n => `      <li><a href="${n.href}">${escapeXml(n.label)}</a></li>`).join('\n');

    const opf = `<?xml version="1.0" encoding="UTF-8"?>
<package xmlns="http://www.idpf.org/2007/opf" version="3.0" unique-identifier="BookId">
  <metadata xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:opf="http://www.idpf.org/2007/opf">
    <dc:identifier id="BookId">${escapeXml(bookId)}</dc:identifier>
    <dc:title>${escapeXml(title)}</dc:title>
    <dc:language>${escapeXml(lang)}</dc:language>
    <dc:creator>${escapeXml(authorFull)}</dc:creator>${genreText ? `\n    <dc:subject>${escapeXml(genreText)}</dc:subject>` : ''}${annotationText ? `\n    <dc:description>${escapeXml(annotationText)}</dc:description>` : ''}
    <meta property="dcterms:modified">${new Date().toISOString().replace(/\.\d+Z$/,'Z')}</meta>
  </metadata>
  <manifest>
    <item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>
    <item id="nav" href="nav.xhtml" media-type="application/xhtml+xml" properties="nav"/>
    <item id="style" href="style.css" media-type="text/css"/>
${coverManifest}${manifestXml}
  </manifest>
  <spine toc="ncx">
${coverSpineRef}${spineXml}
  </spine>
</package>`;
    zip.file('OEBPS/content.opf', opf);

    zip.file('OEBPS/toc.ncx', `<?xml version="1.0" encoding="UTF-8"?>
<ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1">
  <head>
    <meta name="dtb:uid" content="${escapeXml(bookId)}"/>
  </head>
  <docTitle><text>${escapeXml(title)}</text></docTitle>
  <navMap>
${navPointsXml}
  </navMap>
</ncx>`);

    zip.file('OEBPS/nav.xhtml', `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops" xml:lang="${lang}">
<head><meta charset="utf-8"/><title>Оглавление</title></head>
<body>
  <nav epub:type="toc" id="toc">
    <h1>Оглавление</h1>
    <ol>
${navLisXml}
    </ol>
  </nav>
</body>
</html>`);

    const arrayBuffer = await zip.generateAsync({ type:'arraybuffer' });
    const blob = new Blob([arrayBuffer], { type:'application/epub+zip' });
    const filename = (originalFileName.replace(/\.zip$/i,'').replace(/\.fb2$/i,'') || 'book') + '.epub';

    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
  }

  // ---------------- lines ("#"-marked headings) -> nested FB2 <section> tree ----------------
  // mirrors the editor's textToBodyChildren() nesting algorithm, but emits an XML string
  function linesToFB2Tree(text){
    const root = { children: [] };
    const stack = [{ level:0, node: root }];
    let active = null;
    const lines = (text || '').split('\n');
    for (const raw of lines){
      const m = raw.match(/^(#{1,6})\s+(.+)$/);
      if (m){
        const level = m[1].length;
        const titleText = m[2].trim();
        while (stack.length > 1 && stack[stack.length-1].level >= level) stack.pop();
        const parent = stack[stack.length-1].node;
        const sec = { title: titleText, children: [] };
        parent.children.push(sec);
        stack.push({ level, node: sec });
        active = sec;
      } else if (raw.trim() === ''){
        continue;
      } else {
        if (!active){
          const sec = { title: null, children: [] };
          root.children.push(sec);
          stack.push({ level:1, node: sec });
          active = sec;
        }
        active.children.push({ p: raw.trim() });
      }
    }
    return root;
  }
  function renderFB2Node(node, indent, escapeXml){
    const pad = '  '.repeat(indent);
    let xml = pad + '<section>\n';
    if (node.title) xml += pad + `  <title><p>${escapeXml(node.title)}</p></title>\n`;
    for (const child of node.children){
      if ('p' in child) xml += pad + `  <p>${escapeXml(child.p)}</p>\n`;
      else xml += renderFB2Node(child, indent+1, escapeXml);
    }
    xml += pad + '</section>\n';
    return xml;
  }
  function buildFB2BodyXml(text, escapeXml){
    const tree = linesToFB2Tree(text);
    if (!tree.children.length) return '    <section>\n      <p></p>\n    </section>\n';
    return tree.children.map(n => renderFB2Node(n, 2, escapeXml)).join('');
  }

  // ---------------- build & download fb2 ----------------
  async function buildAndDownloadFB2(originalFileName, meta){
    const escapeXml = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    const title = meta.title || 'Без названия';
    const { first: authorFirst, last: authorLast } = splitAuthorName(meta.authorFull);

    let binaryXml = '';

${bodyXml}  </body>${binaryXml}

  // ---------------- main convert flow ----------------
  async function handleFile(file){
    fileName.textContent = file.name;
    hideStatus();
    try {
      await loadJSZip();
      const buffer = await file.arrayBuffer();
      const header = new Uint8Array(buffer.slice(0, 4));
      const looksLikeZip = (header[0]===0x50 && header[1]===0x4B && header[2]===0x03 && header[3]===0x04);

      if (mode === 'epub2fb2'){
        if (!looksLikeZip) throw new Error('Это не похоже на EPUB — сюда нужно загрузить файл .epub');
        const zip = await JSZip.loadAsync(buffer);
        if (!zip.file('META-INF/container.xml')){
          throw new Error('Это файл FB2 — сюда нужно загрузить EPUB (.epub)');
        }
        const parsed = await readEPUBFromZip(zip);
        const meta = {
          title: parsed.title,
          authorFull: parsed.creator,
          genre: parsed.subject,
          annotation: parsed.description,
          cover: parsed.cover,
          text: parsed.text,
          lang: parsed.language
        };
        await buildAndDownloadFB2(file.name, meta);
        showStatus('Готово — FB2 скачан');
      } else {
        let doc;
        if (looksLikeZip){
          const zip = await JSZip.loadAsync(buffer);
          if (zip.file('META-INF/container.xml')){
            throw new Error('Это файл EPUB — сюда нужно загрузить FB2 (.fb2 или .fb2.zip)');
          }
          const result = await readFB2ZipContent(zip);
          doc = result.doc;
        } else {
          if (/\.epub$/i.test(file.name)) throw new Error('Это файл EPUB — сюда нужно загрузить FB2 (.fb2 или .fb2.zip)');
          const text = new TextDecoder('utf-8').decode(buffer);
          doc = new DOMParser().parseFromString(text, 'text/xml');
          if (doc.querySelector('parsererror')) throw new Error('Файл повреждён или не является корректным fb2/xml');
        }

        const meta = extractMeta(doc);
        await buildAndDownloadEpub(file.name, meta);
        showStatus('Готово — EPUB скачан');
      }
    } catch (e){
      showStatus('Не удалось сконвертировать: ' + e.message, true);
    } finally {
      fileInput.value = '';
    }
  }

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' '){ e.preventDefault(); fileInput.click(); }});
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

  function loadJSZip(){
    return new Promise((resolve, reject) => {
      if (typeof JSZip !== 'undefined') return resolve();
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }
  loadJSZip().catch(() => showStatus('Не удалось загрузить библиотеку для работы с архивами', true));

})();
</script>
</body>
</html>
